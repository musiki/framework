name: Notify Platform Content Sync

on:
  push:
    branches: [main]
    paths:
      - "cursos/**"
      - "public/**"
      - "draft/**"
      - "CODEOWNERS"
      - ".github/workflows/notify-platform-on-content-change.yml"
  workflow_dispatch:

jobs:
  notify-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch content update to platform
        env:
          PLATFORM_OWNER: __PLATFORM_OWNER__
          PLATFORM_REPO: __PLATFORM_REPO__
          PLATFORM_EVENT: content-source-updated
          PLATFORM_DISPATCH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PLATFORM_DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${PLATFORM_OWNER}/${PLATFORM_REPO}/dispatches" \
            -d @- <<JSON
          {
            "event_type": "${PLATFORM_EVENT}",
            "client_payload": {
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          JSON
