name: Sync Content Sources

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-source-updated]
  workflow_dispatch:
    inputs:
      trigger_deploy:
        description: "Trigger the VPS content sync after validating the content assembly"
        required: false
        default: "true"

permissions:
  contents: read

concurrency:
  group: content-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull source repositories
        run: npm run content:pull -- --clean
        env:
          CONTENT_SOURCE_READ_TOKEN: ${{ secrets.CONTENT_SOURCE_READ_TOKEN }}

      - name: Assemble src/content (dry run)
        run: npm run content:assemble:dry

      - name: Upload assemble report
        uses: actions/upload-artifact@v4
        with:
          name: assemble-report
          path: .tmp/assemble-report.json
          if-no-files-found: warn

      - name: Sync content on VPS
        if: ${{ github.event_name == 'repository_dispatch' || github.event_name == 'push' || github.event.inputs.trigger_deploy == 'true' }}
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_FRAMEWORK_DIR: ${{ secrets.VPS_FRAMEWORK_DIR }}
          VPS_GIT_BRANCH: ${{ secrets.VPS_GIT_BRANCH }}
          VPS_INSTALL_COMMAND: ${{ secrets.VPS_INSTALL_COMMAND }}
          VPS_BUILD_COMMAND: ${{ secrets.VPS_BUILD_COMMAND }}
          VPS_RELOAD_COMMAND: ${{ secrets.VPS_RELOAD_COMMAND }}
        run: |
          set -euo pipefail

          host="$(printf '%s' "${VPS_SSH_HOST}" | tr -d '[:space:]')"
          port="$(printf '%s' "${VPS_SSH_PORT:-22}" | tr -d '[:space:]')"
          user="$(printf '%s' "${VPS_SSH_USER}" | tr -d '[:space:]')"
          framework_dir="$(printf '%s' "${VPS_FRAMEWORK_DIR}" | sed 's/[[:space:]]*$//')"
          branch="$(printf '%s' "${VPS_GIT_BRANCH:-main}" | tr -d '[:space:]')"
          install_command="$(printf '%s' "${VPS_INSTALL_COMMAND:-npm ci}" | sed 's/[[:space:]]*$//')"
          build_command="$(printf '%s' "${VPS_BUILD_COMMAND:-npm run build}" | sed 's/[[:space:]]*$//')"
          reload_command="$(printf '%s' "${VPS_RELOAD_COMMAND}" | sed 's/[[:space:]]*$//')"

          if [[ -z "${host}" || -z "${user}" || -z "${framework_dir}" || -z "${VPS_SSH_KEY}" ]]; then
            echo "VPS_SSH_HOST, VPS_SSH_USER, VPS_FRAMEWORK_DIR and VPS_SSH_KEY are required."
            exit 1
          fi

          key_file="$(mktemp)"
          trap 'rm -f "${key_file}"' EXIT
          printf '%s\n' "${VPS_SSH_KEY}" > "${key_file}"
          chmod 600 "${key_file}"

          remote_cmd="cd ${framework_dir@Q} && git checkout ${branch@Q} && git pull --ff-only origin ${branch@Q}"
          if [[ -n "${install_command}" ]]; then
            remote_cmd="${remote_cmd} && ${install_command}"
          fi
          remote_cmd="${remote_cmd} && ${build_command}"
          if [[ -n "${reload_command}" ]]; then
            remote_cmd="${remote_cmd} && ${reload_command}"
          fi

          echo "Running VPS content sync on ${user}@${host}:${framework_dir}"
          ssh -i "${key_file}" \
            -p "${port}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${user}@${host}" \
            "bash -lc $(printf '%q' "${remote_cmd}")"
