name: Sync Content Sources

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content-source-updated]
  workflow_dispatch:
    inputs:
      trigger_deploy:
        description: "Trigger the VPS deploy after validation"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: content-sync
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  validate:
    name: Validate Content Assembly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull source repositories
        run: npm run content:pull -- --clean
        env:
          CONTENT_SOURCE_READ_TOKEN: ${{ secrets.CONTENT_SOURCE_READ_TOKEN }}

      - name: Assemble src/content (dry run)
        run: npm run content:assemble:dry

      - name: Upload assemble report
        uses: actions/upload-artifact@v4
        with:
          name: assemble-report
          path: .tmp/assemble-report.json
          if-no-files-found: warn

  deploy:
    name: Deploy to VPS
    needs: validate
    if: ${{ github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event.inputs.trigger_deploy == 'true' }}
    runs-on: [self-hosted, linux, x64, musiki-framework]
    env:
      CONTENT_SOURCE_READ_TOKEN: ${{ secrets.CONTENT_SOURCE_READ_TOKEN }}
      VPS_FRAMEWORK_DIR: ${{ vars.VPS_FRAMEWORK_DIR || '/opt/musiki/framework' }}
      VPS_GIT_BRANCH: ${{ vars.VPS_GIT_BRANCH || 'main' }}
      VPS_INSTALL_COMMAND: ${{ vars.VPS_INSTALL_COMMAND || 'npm ci' }}
      VPS_CONTENT_SOURCE_STRATEGY: ${{ vars.VPS_CONTENT_SOURCE_STRATEGY || 'remote-only' }}
    steps:
      - name: Zero Downtime Sync and Build on VPS
        run: |
          cd "$VPS_FRAMEWORK_DIR"
          
          # Ensure PM2 and Node are in PATH (common issue in non-interactive shells)
          export PATH=$PATH:$(npm config get prefix)/bin
          
          echo ">>> Fetching latest code..."
          git fetch origin "$VPS_GIT_BRANCH"
          git checkout "$VPS_GIT_BRANCH"
          git reset --hard "origin/$VPS_GIT_BRANCH"
          
          echo ">>> Installing dependencies..."
          if [ -n "$VPS_INSTALL_COMMAND" ]; then
            $VPS_INSTALL_COMMAND
          fi
          
          echo ">>> Preparing content..."
          CONTENT_SOURCE_STRATEGY="$VPS_CONTENT_SOURCE_STRATEGY" npm run content:pull -- --clean
          CONTENT_SOURCE_STRATEGY="$VPS_CONTENT_SOURCE_STRATEGY" npm run content:assemble
          
          echo ">>> Running Database Sync..."
          npm run eval:sync:db
          
          echo ">>> Building Astro to temporary directory (ZERO DOWNTIME)..."
          # We build to dist_tmp so the current 'dist' remains untouched and serving
          npx astro build --remote --outDir dist_tmp
          
          echo ">>> Atomic Swap of dist folders..."
          rm -rf dist_old
          if [ -d "dist" ]; then
            mv dist dist_old
          fi
          mv dist_tmp dist
          
          echo ">>> Reloading PM2..."
          # Reload ensures the running Node process switches to the new files in 'dist'
          pm2 reload ecosystem.config.cjs --only musiki-framework --update-env || pm2 start ecosystem.config.cjs
          pm2 save
          
          echo ">>> Cleanup..."
          rm -rf dist_old
          
          echo ">>> Deploy finished successfully."
