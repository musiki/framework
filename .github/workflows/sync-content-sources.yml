name: Sync Content Sources

on:
  repository_dispatch:
    types: [content-source-updated]
  workflow_dispatch:
    inputs:
      trigger_deploy:
        description: "Trigger a Vercel deploy hook after validating the content assembly"
        required: false
        default: "true"

permissions:
  contents: read

concurrency:
  group: content-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull source repositories
        run: npm run content:pull -- --clean
        env:
          CONTENT_SOURCE_READ_TOKEN: ${{ secrets.CONTENT_SOURCE_READ_TOKEN }}

      - name: Assemble src/content (dry run)
        run: npm run content:assemble:dry

      - name: Upload assemble report
        uses: actions/upload-artifact@v4
        with:
          name: assemble-report
          path: .tmp/assemble-report.json
          if-no-files-found: warn

      - name: Trigger Vercel deploy hook
        if: ${{ github.event_name == 'repository_dispatch' || github.event.inputs.trigger_deploy == 'true' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          hook_url="$(printf '%s' "${VERCEL_DEPLOY_HOOK_URL}" | tr -d '\r\n')"

          if [[ -z "${hook_url}" ]]; then
            echo "VERCEL_DEPLOY_HOOK_URL not configured."
            exit 1
          fi

          response_file="$(mktemp)"
          error_file="$(mktemp)"
          http_code="$(
            curl -sS -o "${response_file}" -w '%{http_code}' -X POST "${hook_url}" 2>"${error_file}"
          )"
          curl_exit=$?

          if [[ "${curl_exit}" -ne 0 ]]; then
            echo "curl failed with exit code ${curl_exit}"
            cat "${error_file}"
            exit "${curl_exit}"
          fi

          echo "Vercel deploy hook HTTP ${http_code}"
          cat "${response_file}"

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            echo
            echo "Vercel deploy hook failed."
            exit 1
          fi
