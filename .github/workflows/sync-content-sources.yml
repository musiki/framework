name: Sync Content Sources

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content-source-updated]
  workflow_dispatch:
    inputs:
      trigger_deploy:
        description: "Trigger the VPS deploy after validation"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: content-sync
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Content Assembly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull source repositories
        run: npm run content:pull -- --clean
        env:
          CONTENT_SOURCE_READ_TOKEN: ${{ secrets.CONTENT_SOURCE_READ_TOKEN }}

      - name: Assemble src/content (dry run)
        run: npm run content:assemble:dry

      - name: Upload assemble report
        uses: actions/upload-artifact@v4
        with:
          name: assemble-report
          path: .tmp/assemble-report.json
          if-no-files-found: warn

  deploy:
    name: Deploy to VPS
    needs: validate
    if: ${{ github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event.inputs.trigger_deploy == 'true' }}
    runs-on: [self-hosted, linux, x64, musiki-framework]
    env:
      CONTENT_SOURCE_READ_TOKEN: ${{ secrets.CONTENT_SOURCE_READ_TOKEN }}
      VPS_FRAMEWORK_DIR: ${{ vars.VPS_FRAMEWORK_DIR || '/opt/musiki/framework' }}
      VPS_GIT_BRANCH: ${{ vars.VPS_GIT_BRANCH || 'main' }}
      VPS_INSTALL_COMMAND: ${{ vars.VPS_INSTALL_COMMAND || 'npm ci' }}
      VPS_BUILD_COMMAND: ${{ vars.VPS_BUILD_COMMAND || 'npm run build' }}
      VPS_RELOAD_COMMAND: ${{ vars.VPS_RELOAD_COMMAND || 'pm2 reload ecosystem.config.cjs --only musiki-framework --update-env && pm2 save' }}
      VPS_CONTENT_SOURCE_STRATEGY: ${{ vars.VPS_CONTENT_SOURCE_STRATEGY || 'remote-only' }}
    steps:
      - name: Sync and Build on VPS
        run: |
          cd "$VPS_FRAMEWORK_DIR"
          git fetch origin "$VPS_GIT_BRANCH"
          git checkout "$VPS_GIT_BRANCH"
          git reset --hard "origin/$VPS_GIT_BRANCH"
          
          # Run install if specified
          if [ -n "$VPS_INSTALL_COMMAND" ]; then
            $VPS_INSTALL_COMMAND
          fi
          
          # Run build (which includes content:pull and content:assemble)
          # We pass CONTENT_SOURCE_STRATEGY to override local paths in VPS
          CONTENT_SOURCE_STRATEGY="$VPS_CONTENT_SOURCE_STRATEGY" $VPS_BUILD_COMMAND
          
          # Reload process manager
          if [ -n "$VPS_RELOAD_COMMAND" ]; then
            $VPS_RELOAD_COMMAND
          fi
