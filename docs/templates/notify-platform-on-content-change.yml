name: Notify Platform Content Sync (Content Bus)

on:
  push:
    branches: [main]
    paths:
      - "cursos/**"
      - "public/**"
      - "draft/**"
      - "CODEOWNERS"
      - ".github/workflows/notify-platform-on-content-change.yml"
  workflow_dispatch:

jobs:
  notify-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Content Bus Webhook
        env:
          CONTENT_BUS_SECRET: ${{ secrets.CONTENT_BUS_SECRET }}
        run: |
          # Avisamos al Content Bus del Framework (Zero Downtime)
          # Usamos la IP directa para saltar problemas de DNS/Timeout en el handshake
          # -k permite ignorar el aviso de certificado de la IP
          # -H "Host: musiki.org.ar" indica a Caddy a qué dominio pertenece la petición
          curl -sS -k -X POST https://85.31.234.141/api/webhook/content-update \
            -H "Host: musiki.org.ar" \
            -H "Authorization: Bearer ${CONTENT_BUS_SECRET}" \
            -H "Content-Type: application/json" \
            -d @- <<JSON
          {
            "source_repo": "${{ github.repository }}",
            "source_sha": "${{ github.sha }}",
            "source_ref": "${{ github.ref_name }}"
          }
          JSON
